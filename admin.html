<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nö.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        button, .clickable { cursor: pointer !important; touch-action: manipulation; user-select: none; }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans flex flex-col">

    <nav class="bg-blue-600 text-white shadow-xl sticky top-0 z-[9999]">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-2 py-2">
                <i class="fa-solid fa-hand"></i>
                <span class="font-bold">Nö-Zentrale</span>
            </div>
            
            <div class="hidden md:flex items-center space-x-2">
                <button class="px-4 py-2 hover:bg-blue-700 rounded-lg transition">Vielleicht</button>
                <button class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold ml-4 shadow-md active:scale-95 transition">Sicher nicht</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-4">
        
        <section class="w-full max-w-2xl">
            <div class="bg-white p-12 md:p-24 rounded-[3rem] shadow-sm text-center border border-slate-200 animate-in fade-in zoom-in duration-500">
                
                <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-8 text-4xl shadow-inner">
                    <i class="fa-solid fa-xmark"></i>
                </div>

                <h1 class="text-[8rem] md:text-[12rem] font-black text-slate-800 leading-none mb-6 tracking-tighter">
                    Nö
                </h1>
                
                <p class="text-slate-500 text-xl md:text-2xl max-w-sm mx-auto font-medium">
                    Frag erst gar nicht.
                </p>

                <div class="mt-12">
                    <button onclick="location.reload()" class="bg-slate-800 text-white px-12 py-5 rounded-2xl font-bold text-xl shadow-xl active:scale-95 transition-all hover:bg-slate-900">
                        Okay...
                    </button>
                </div>

            </div>
        </section>

    </main>

    <footer class="p-6 text-center text-slate-400 text-sm">
        © 2026 Abteilung für Ablehnung
    </footer>

</body>
</html>
