<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stopp.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Verhindert Textauswahl, um die Endgültigkeit zu betonen */
        body {
            user-select: none;
            -webkit-user-select: none;
        }
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen font-sans flex flex-col items-center justify-center p-4">

    <main class="w-full max-w-2xl animate-in fade-in slide-in-from-top-4 duration-700">
        
        <div class="bg-white p-12 md:p-20 rounded-[3rem] shadow-xl text-center border border-slate-200">
            
            <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-10 text-5xl shadow-inner border-4 border-white">
                <i class="fa-solid fa-ban"></i>
            </div>

            <h1 class="text-5xl md:text-7xl font-black text-slate-950 mb-6 tracking-tighter leading-tight text-balance">
                Versuche es <span class="text-red-600">gar nicht!</span>
            </h1>
            
            <p class="text-slate-600 text-xl md:text-2xl max-w-md mx-auto font-medium mb-12">
                Es hat keinen Zweck. Drehe einfach um.
            </p>

            <div class="mt-12">
                <button disabled class="bg-slate-300 text-slate-500 px-12 py-5 rounded-2xl font-bold text-xl shadow-none cursor-not-allowed opacity-60">
                    Zwecklos
                </button>
            </div>

        </div>
    </main>

    <footer class="absolute bottom-6 text-center text-slate-400 text-sm">
        Endstation. Hier geht es nicht weiter.
    </footer>

</body>
</html>
